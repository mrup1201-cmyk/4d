<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Snake PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;font-family:Arial}

body{
    background:#111;
    color:#fff;
    height:100vh;
}

.screen{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{display:flex}

h1{margin-bottom:20px}

.btn{
    width:220px;
    padding:14px;
    margin:6px;
    border:none;
    border-radius:12px;
    font-size:18px;
    background:#2c2c2c;
    color:#fff;
}

canvas{
    background:#1b1b1b;
    border-radius:12px;
    border:2px solid #444;
}

#hud{
    margin-bottom:10px;
}

/* settings */
.card{
    width:280px;
    padding:10px;
    margin:6px;
    border:1px solid #444;
    border-radius:12px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
<h1>🐍 Snake PRO</h1>
<button class="btn" onclick="startGame()">Играть</button>
<button class="btn" onclick="showLB()">Рекорд</button>
<button class="btn" onclick="showSettings()">Настройки</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
<div id="hud">Счёт: 0 | Рекорд: 0</div>
<canvas id="game" width="360" height="360"></canvas>

<div id="controls">
<button class="btn" onclick="setDir(0,-1)">▲</button>
<button class="btn" onclick="setDir(-1,0)">◀</button>
<button class="btn" onclick="setDir(0,1)">▼</button>
<button class="btn" onclick="setDir(1,0)">▶</button>
</div>

<button class="btn" onclick="back()">Меню</button>
</div>

<!-- GAME OVER -->
<div id="over" class="screen">
<h2 id="overText"></h2>
<button class="btn" onclick="startGame()">Играть снова</button>
<button class="btn" onclick="back()">В меню</button>
</div>

<!-- LB -->
<div id="lb" class="screen">
<h2>🏆 Рекорды</h2>
<div class="card" id="lbText"></div>
<button class="btn" onclick="back()">Назад</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<h2>Настройки</h2>

<div class="card">
Управление:
<select id="ctrl">
<option value="buttons">Кнопки</option>
<option value="swipe">Свайпы</option>
</select>
</div>

<div class="card">
Вибрация:
<input type="checkbox" id="vib">
</div>

<div class="card">
Тема:
<select id="theme">
<option value="dark">Темная</option>
<option value="mixed">Микс</option>
<option value="light">Светлая</option>
</select>
</div>

<div class="card">
Энергос?
<button onclick="vote('yes')">Да</button>
<button onclick="vote('no')">Нет</button>
<div id="vote"></div>
</div>

<button class="btn" onclick="save()">Сохранить</button>
<button class="btn" onclick="back()">Назад</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const hud=document.getElementById("hud");

const size=20;
const cells=18;

let snake,dx,dy,food,score,timer;
let inputQueue=[];
let lastDir={x:1,y:0};

let best=+localStorage.getItem("best")||0;
let games=+localStorage.getItem("games")||0;

/* SCREEN */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function startGame(){
show("gameScreen");
reset();
clearInterval(timer);
timer=setInterval(loop,120);
}

function back(){
clearInterval(timer);
show("menu");
}

function showLB(){
show("lb");
document.getElementById("lbText").innerHTML=
`Лучший: ${best}<br>Игр: ${games}`;
}

function showSettings(){
show("settings");
}

/* GAME */
function reset(){
snake=[{x:9,y:9}];
dx=1;dy=0;
score=0;
food=spawn();
games++;
localStorage.setItem("games",games);
updateHud();
}

function spawn(){
return {x:Math.floor(Math.random()*cells),y:Math.floor(Math.random()*cells)};
}

/* PRO INPUT */
function setDir(x,y){
inputQueue.push({x,y});
}

function processInput(){
if(inputQueue.length===0)return;

let n=inputQueue.shift();
if(n.x===-dx&&n.y===-dy)return;

dx=n.x;dy=n.y;
lastDir={x:dx,y:dy};
}

/* VIB */
function vib(t){
if(localStorage.getItem("vib")==="true"&&navigator.vibrate)
navigator.vibrate(t);
}

/* GAME OVER */
function gameOver(text){
clearInterval(timer);
vib(200);

if(score>best){
best=score;
localStorage.setItem("best",best);
}

document.getElementById("overText").innerText=
text+"\nСчёт: "+score;

show("over");
}

/* LOOP */
function loop(){

processInput();

let head={x:snake[0].x+dx,y:snake[0].y+dy};

if(head.x<0||head.y<0||head.x>=cells||head.y>=cells){
gameOver("💥 Стена");
return;
}

for(let s of snake){
if(head.x===s.x&&head.y===s.y){
gameOver("🐍 Себя");
return;
}
}

snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
score++;
vib(40);
food=spawn();
}else snake.pop();

updateHud();
draw();
}

function updateHud(){
hud.textContent=`Счёт: ${score} | Рекорд: ${best}`;
}

function draw(){
ctx.clearRect(0,0,360,360);

ctx.fillStyle="red";
ctx.fillRect(food.x*size,food.y*size,size,size);

snake.forEach((p,i)=>{
ctx.fillStyle=i?"#00cc66":"#00ff88";
ctx.fillRect(p.x*size,p.y*size,size-2,size-2);
});
}

/* SETTINGS */
function save(){
localStorage.setItem("vib",vib.checked);
localStorage.setItem("ctrl",ctrl.value);
localStorage.setItem("theme",theme.value);

alert("Сохранено");
}

/* VOTE */
function vote(v){
let d=JSON.parse(localStorage.getItem("vote")||"{}");
if(d.user){vote.innerText="Уже голос";return;}

d[v]=(d[v]||0)+1;
d.user=1;
localStorage.setItem("vote",JSON.stringify(d));

document.getElementById("vote").innerText=
`Да:${d.yes||0} Нет:${d.no||0}`;
}

/* SWIPE */
let sx,sy;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
if(localStorage.getItem("ctrl")!=="swipe")return;

let dxs=e.changedTouches[0].clientX-sx;
let dys=e.changedTouches[0].clientY-sy;

if(Math.abs(dxs)>Math.abs(dys)){
setDir(dxs>0?1:-1,0);
}else{
setDir(0,dys>0?1:-1);
}
});

draw();

</script>
</body>
</html>
