<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snake Mobile</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#111;color:#fff;height:100vh}
.screen{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px}
.active{display:flex}
.menu-btn,.btn{padding:14px 20px;margin:8px;border:none;border-radius:12px;font-size:18px}
.menu-btn{width:240px}
canvas{background:#1b1b1b;border-radius:12px;border:2px solid #444}
#hud{margin-bottom:10px}
.controls{margin-top:15px;display:grid;grid-template-columns:80px 80px 80px;gap:8px}
.btn{width:80px;height:80px}
.light{background:#f5f5f5;color:#111}
.mixed{background:#222;color:#fff}
.card{padding:12px;border:1px solid #555;border-radius:12px;margin:8px;width:280px}
</style>
</head>
<body>

<div id="menu" class="screen active">
<h1>🐍 Snake</h1>
<button class="menu-btn" onclick="startGame()">Играть</button>
<button class="menu-btn" onclick="showScreen('leaderboard')">Рекорд</button>
<button class="menu-btn" onclick="showScreen('settings')">Настройки</button>
</div>

<div id="gameScreen" class="screen">
<div id="hud">Счёт: 0 | Рекорд: 0</div>
<canvas id="game" width="360" height="360"></canvas>

<div id="controls" class="controls">
<div></div><button class="btn" onclick="setDirection(0,-1)">▲</button><div></div>
<button class="btn" onclick="setDirection(-1,0)">◀</button>
<button class="btn" onclick="setDirection(0,1)">▼</button>
<button class="btn" onclick="setDirection(1,0)">▶</button>
</div>

<button class="menu-btn" onclick="backMenu()">Меню</button>
</div>

<div id="leaderboard" class="screen">
<h2>🏆 Рекорд</h2>
<div class="card">Лучший счёт: <span id="bestScore"></span></div>
<button class="menu-btn" onclick="showScreen('menu')">Назад</button>
</div>

<div id="settings" class="screen">
<h2>⚙ Настройки</h2>

<div class="card">
Управление:
<select id="controlType">
<option value="buttons">Кнопки</option>
<option value="swipe">Свайпы</option>
</select>
</div>

<div class="card">
Вибрация:
<input type="checkbox" id="vibration">
</div>

<div class="card">
Тема:
<select id="theme">
<option value="dark">Темная</option>
<option value="mixed">Темно-светлая</option>
<option value="light">Светлая</option>
</select>
</div>

<div class="card">
Энергос?
<button onclick="voteEnergos('Да')">Да</button>
<button onclick="voteEnergos('Нет')">Нет</button>
<div id="voteResult"></div>
</div>

<button class="menu-btn" onclick="saveSettings()">Сохранить</button>
<button class="menu-btn" onclick="showScreen('menu')">Назад</button>
</div>

<script>
const canvas=game;
const ctx=canvas.getContext("2d");
const size=20,cells=18;
let snake,dx,dy,food,score,timer;
let best=+localStorage.getItem("bestScore")||0;

function showScreen(id){
document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.getElementById('bestScore').textContent=best;
}

function startGame(){
showScreen('gameScreen');
resetGame();
clearInterval(timer);
timer=setInterval(loop,120);
}

function backMenu(){
clearInterval(timer);
showScreen('menu');
}

function resetGame(){
snake=[{x:9,y:9}];
dx=1;dy=0;score=0;
food=spawnFood();
updateHud();
}

function spawnFood(){
return {x:Math.floor(Math.random()*cells),y:Math.floor(Math.random()*cells)};
}

function setDirection(nx,ny){
if(nx===-dx&&ny===-dy)return;
dx=nx;dy=ny;
}

function vibrate(ms){
if(localStorage.getItem("vibration")==="true" && navigator.vibrate) navigator.vibrate(ms);
}

function loop(){
let head={x:snake[0].x+dx,y:snake[0].y+dy};
if(head.x<0)head.x=cells-1;
if(head.y<0)head.y=cells-1;
if(head.x>=cells)head.x=0;
if(head.y>=cells)head.y=0;

for(let s of snake){
if(head.x===s.x&&head.y===s.y){
vibrate(200);
if(score>best){best=score;localStorage.setItem("bestScore",best);}
alert("Игра окончена. Счёт: "+score);
resetGame();
return;
}
}

snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
score++;
vibrate(40);
food=spawnFood();
}else snake.pop();

updateHud();
draw();
}

function updateHud(){
hud.textContent=`Счёт: ${score} | Рекорд: ${best}`;
}

function draw(){
ctx.clearRect(0,0,360,360);
ctx.fillStyle="red";
ctx.fillRect(food.x*size,food.y*size,size,size);
snake.forEach((p,i)=>{
ctx.fillStyle=i?"#00cc66":"#00ff88";
ctx.fillRect(p.x*size,p.y*size,size-2,size-2);
});
}

function saveSettings(){
localStorage.setItem("controlType",controlType.value);
localStorage.setItem("vibration",vibration.checked);
localStorage.setItem("theme",theme.value);

document.body.className="";
if(theme.value==="light") document.body.classList.add("light");
if(theme.value==="mixed") document.body.classList.add("mixed");

controls.style.display=controlType.value==="buttons"?"grid":"none";
alert("Сохранено");
}

function voteEnergos(ans){
if(localStorage.getItem("energosVote")){
voteResult.innerHTML="Ответ уже выбран.";
return;
}
localStorage.setItem("energosVote",ans);
voteResult.innerHTML="Ваш ответ: "+ans;
}

let sx=0,sy=0;
canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});
canvas.addEventListener("touchend",e=>{
if(localStorage.getItem("controlType")!=="swipe") return;
let dxs=e.changedTouches[0].clientX-sx;
let dys=e.changedTouches[0].clientY-sy;
if(Math.abs(dxs)>Math.abs(dys)){
if(dxs>0)setDirection(1,0); else setDirection(-1,0);
}else{
if(dys>0)setDirection(0,1); else setDirection(0,-1);
}
});

draw();
</script>
</body>
</html>
