<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Snake Ultimate</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;font-family:Arial}

body{
    height:100vh;
    background:#111;
    color:#fff;
}

/* SCREENS */
.screen{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}
.active{display:flex}

/* MENU */
h1{margin-bottom:20px}

.btn{
    width:220px;
    padding:14px;
    margin:6px;
    border:none;
    border-radius:12px;
    font-size:18px;
    background:#2c2c2c;
    color:#fff;
}

/* GAME */
canvas{
    background:#1b1b1b;
    border-radius:12px;
    border:2px solid #444;
}

#hud{
    margin-bottom:10px;
}

/* CONTROLS */
.controls{
    display:grid;
    grid-template-columns:80px 80px 80px;
    gap:10px;
    margin-top:10px;
}

/* THEMES */
.light{background:#f5f5f5;color:#111}
.mixed{background:#222;color:#fff}

/* CARD */
.card{
    width:280px;
    padding:12px;
    border:1px solid #444;
    border-radius:12px;
    margin:6px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
<h1>🐍 Snake Ultimate</h1>
<button class="btn" onclick="startGame()">Играть</button>
<button class="btn" onclick="showLeaderboard()">Рекорд</button>
<button class="btn" onclick="showSettings()">Настройки</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
<div id="hud">Счёт: 0 | Рекорд: 0</div>
<canvas id="game" width="360" height="360"></canvas>

<div class="controls" id="controls">
<div></div><button class="btn" onclick="dir(0,-1)">▲</button><div></div>
<button class="btn" onclick="dir(-1,0)">◀</button>
<button class="btn" onclick="dir(0,1)">▼</button>
<button class="btn" onclick="dir(1,0)">▶</button>
</div>

<button class="btn" onclick="backMenu()">Меню</button>
</div>

<!-- GAME OVER -->
<div id="overScreen" class="screen">
<h2 id="overText">Game Over</h2>
<button class="btn" onclick="startGame()">Играть снова</button>
<button class="btn" onclick="backMenu()">В меню</button>
</div>

<!-- LEADERBOARD -->
<div id="lb" class="screen">
<h2>🏆 Рекорды</h2>
<div class="card" id="lbText"></div>
<button class="btn" onclick="backMenu()">Назад</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<h2>⚙ Настройки</h2>

<div class="card">
Управление:
<select id="controlType">
<option value="buttons">Кнопки</option>
<option value="swipe">Свайпы</option>
</select>
</div>

<div class="card">
Вибрация:
<input type="checkbox" id="vib">
</div>

<div class="card">
Тема:
<select id="theme">
<option value="dark">Темная</option>
<option value="mixed">Темно-светлая</option>
<option value="light">Светлая</option>
</select>
</div>

<div class="card">
Энергос?
<button onclick="vote('yes')">Да</button>
<button onclick="vote('no')">Нет</button>
<div id="vote"></div>
</div>

<button class="btn" onclick="save()">Сохранить</button>
<button class="btn" onclick="backMenu()">Назад</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const size=20;
const cells=18;

let snake,dx,dy,food,score,timer;

let best=+localStorage.getItem("best")||0;
let games=+localStorage.getItem("games")||0;

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function startGame(){
show("gameScreen");
reset();
clearInterval(timer);
timer=setInterval(loop,120);
}

function backMenu(){
clearInterval(timer);
show("menu");
}

function showLeaderboard(){
show("lb");
games=+localStorage.getItem("games")||0;
document.getElementById("lbText").innerHTML=
`Лучший счёт: ${best}<br>Игр сыграно: ${games}`;
}

function showSettings(){
show("settings");
}

function reset(){
snake=[{x:9,y:9}];
dx=1;dy=0;
score=0;
food=spawn();
updateHud();
games++;
localStorage.setItem("games",games);
}

function spawn(){
return {x:Math.floor(Math.random()*cells),y:Math.floor(Math.random()*cells)};
}

function dir(x,y){
if(x===-dx&&y===-dy)return;
dx=x;dy=y;
}

function vib(t){
if(localStorage.getItem("vib")==="true" && navigator.vibrate)
navigator.vibrate(t);
}

function gameOver(text){
clearInterval(timer);
vib(200);

if(score>best){
best=score;
localStorage.setItem("best",best);
}

document.getElementById("overText").innerText=
text+"\nСчёт: "+score;

show("overScreen");
}

function loop(){

let head={x:snake[0].x+dx,y:snake[0].y+dy};

if(head.x<0||head.y<0||head.x>=cells||head.y>=cells){
gameOver("💥 Врезался в стену");
return;
}

for(let s of snake){
if(head.x===s.x&&head.y===s.y){
gameOver("🐍 Укусил себя");
return;
}
}

snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
score++;
vib(40);
food=spawn();
}else snake.pop();

updateHud();
draw();
}

function updateHud(){
hud.textContent=`Счёт: ${score} | Рекорд: ${best}`;
}

function draw(){
ctx.clearRect(0,0,360,360);

ctx.fillStyle="red";
ctx.fillRect(food.x*size,food.y*size,size,size);

snake.forEach((p,i)=>{
ctx.fillStyle=i?"#00cc66":"#00ff88";
ctx.fillRect(p.x*size,p.y*size,size-2,size-2);
});
}

/* SETTINGS */
function save(){
localStorage.setItem("controlType",controlType.value);
localStorage.setItem("vib",vib.checked);
localStorage.setItem("theme",theme.value);

document.body.className="";
if(theme.value==="light")document.body.classList.add("light");
if(theme.value==="mixed")document.body.classList.add("mixed");

document.getElementById("controls").style.display=
controlType.value==="buttons"?"grid":"none";
alert("Сохранено");
}

/* VOTE */
function vote(v){
let data=JSON.parse(localStorage.getItem("vote")||"{}");

if(data.userVote){
document.getElementById("vote").innerText="Вы уже голосовали";
return;
}

data[v]=(data[v]||0)+1;
data.userVote=v;

localStorage.setItem("vote",JSON.stringify(data));

document.getElementById("vote").innerText=
`Да: ${data.yes||0} | Нет: ${data.no||0}`;
}

/* SWIPE */
let sx,sy;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
if(localStorage.getItem("controlType")!=="swipe")return;

let dxs=e.changedTouches[0].clientX-sx;
let dys=e.changedTouches[0].clientY-sy;

if(Math.abs(dxs)>Math.abs(dys)){
dir(dxs>0?1:-1,0);
}else{
dir(0,dys>0?1:-1);
}
});

draw();

</script>

</body>
</html>
