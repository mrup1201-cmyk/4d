<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Mobile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:none;
}

body{
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

#score{
    margin-bottom:10px;
    font-size:24px;
    font-weight:bold;
}

canvas{
    background:#1b1b1b;
    border:2px solid #444;
    border-radius:12px;
}

.controls{
    margin-top:20px;
    display:grid;
    grid-template-columns:80px 80px 80px;
    gap:10px;
}

.btn{
    width:80px;
    height:80px;
    border:none;
    border-radius:16px;
    background:#2c2c2c;
    color:white;
    font-size:30px;
}

.btn:active{
    transform:scale(0.95);
}
</style>
</head>
<body>

<div id="score">Счёт: 0</div>

<canvas id="game" width="360" height="360"></canvas>

<div class="controls">
    <div></div>
    <button class="btn" id="up">▲</button>
    <div></div>

    <button class="btn" id="left">◀</button>
    <button class="btn" id="down">▼</button>
    <button class="btn" id="right">▶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreText = document.getElementById("score");

const size = 20;
const cells = canvas.width / size;

let snake = [
    {x:9,y:9}
];

let dx = 1;
let dy = 0;

let food = spawnFood();
let score = 0;

function spawnFood(){
    return {
        x: Math.floor(Math.random()*cells),
        y: Math.floor(Math.random()*cells)
    };
}

function setDirection(nx,ny){

    if(nx === -dx && ny === -dy) return;

    dx = nx;
    dy = ny;
}

document.getElementById("up")
.onclick=()=>setDirection(0,-1);

document.getElementById("down")
.onclick=()=>setDirection(0,1);

document.getElementById("left")
.onclick=()=>setDirection(-1,0);

document.getElementById("right")
.onclick=()=>setDirection(1,0);

function gameLoop(){

    let head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    if(head.x < 0) head.x = cells-1;
    if(head.x >= cells) head.x = 0;
    if(head.y < 0) head.y = cells-1;
    if(head.y >= cells) head.y = 0;

    for(let i=0;i<snake.length;i++){

        if(
            head.x === snake[i].x &&
            head.y === snake[i].y
        ){
            alert("Игра окончена! Счёт: " + score);

            snake=[{x:9,y:9}];
            dx=1;
            dy=0;
            score=0;

            scoreText.innerText =
            "Счёт: 0";

            food=spawnFood();

            return;
        }
    }

    snake.unshift(head);

    if(
        head.x===food.x &&
        head.y===food.y
    ){
        score++;

        scoreText.innerText =
        "Счёт: " + score;

        food=spawnFood();
    }else{
        snake.pop();
    }

    draw();
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle="red";

    ctx.fillRect(
        food.x*size,
        food.y*size,
        size,
        size
    );

    snake.forEach((part,index)=>{

        ctx.fillStyle =
        index===0
        ? "#00ff88"
        : "#00cc66";

        ctx.fillRect(
            part.x*size,
            part.y*size,
            size-2,
            size-2
        );
    });
}

draw();

setInterval(gameLoop,120);
</script>

</body>
</html>
